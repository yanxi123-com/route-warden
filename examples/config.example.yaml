controller:
  # Clash Verge 默认可通过 Unix Socket 暴露 controller
  base_url: "unix:///tmp/verge/verge-mihomo.sock"
  secret: ""

interval_sec: 180
cooldown_sec: 600
min_wins: 3
min_improvement: 0.15

groups:
  # 建议在 Clash Profile Enhancement Groups 里预置 RW_* 组
  GOOGLE_GROUP:
    strategy_group: "RW_GOOGLE"
  BINANCE_GROUP:
    strategy_group: "RW_BINANCE"
  OPENAI_GROUP:
    strategy_group: "RW_OPENAI"
  GITHUB_GROUP:
    strategy_group: "RW_GITHUB"
  GLOBAL_BEST:
    strategy_group: "RW_GLOBAL"

targets:
  GOOGLE_GROUP:
    - name: "google"
      url: "https://www.google.com/generate_204"
      success_status: [204]
  BINANCE_GROUP:
    - name: "binance"
      url: "https://api.binance.com/api/v3/time"
      success_status: [200, 403]
  OPENAI_GROUP:
    - name: "chatgpt"
      url: "https://chatgpt.com/favicon.ico"
      success_status: [200, 301, 302]
    - name: "openai"
      url: "https://api.openai.com/v1/models"
      success_status: [200, 401, 403]
  GITHUB_GROUP:
    - name: "github"
      url: "https://github.com"
      success_status: [200, 301, 302]
    - name: "github-api"
      url: "https://api.github.com"
      success_status: [200]
  GLOBAL_BEST:
    - name: "google"
      url: "https://www.google.com/generate_204"
      success_status: [204]
    - name: "binance"
      url: "https://api.binance.com/api/v3/time"
      success_status: [200, 403]

scoring:
  availability_weight: 0.7
  p50_weight: 0.15
  p95_weight: 0.1
  jitter_weight: 0.05

routing:
  domain_to_group:
    "google.com": "GOOGLE_GROUP"
    "api.binance.com": "BINANCE_GROUP"
    "chatgpt.com": "OPENAI_GROUP"
    "api.openai.com": "OPENAI_GROUP"
    "github.com": "GITHUB_GROUP"
    "api.github.com": "GITHUB_GROUP"

logging:
  level: "info"
